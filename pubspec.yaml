name: wa_toolkit
description: WA Toolkit by mef tech — save WhatsApp statuses, capture notifications, secure vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Storage & persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Permissions & file access (Android SAF for scoped storage)
  permission_handler: ^11.3.1
  saf_util: ^0.12.0
  saf_stream: ^2.0.0

  # Networking / downloading
  dio: ^5.4.3
  flutter_downloader: ^1.11.6
  crypto: ^3.0.3

  # Media actions
  share_plus: ^10.1.4
  gal: ^2.3.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # UI
  photo_view: ^0.15.0
  video_player: ^2.9.1
  provider: ^6.1.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  video_thumbnail: ^0.5.6
  notification_listener_service: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
